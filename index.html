<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Trust Fix Mobile Repair</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1724; color: #e2e8f0; min-height: 100vh; }
        
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-header h1 { font-size: 22px; color: #fff; }
        .admin-header h1 span { color: #e94560; }
        .admin-header .header-right { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .admin-header .user-badge { background: #e94560; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .admin-header .logout-btn, .admin-header .refresh-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: white;
        }
        .admin-header .logout-btn { background: #e94560; }
        .admin-header .logout-btn:hover { background: #c0392b; }
        .admin-header .refresh-btn { background: #2d6a4f; }
        .admin-header .refresh-btn:hover { background: #1b4332; }
        
        .admin-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a2236;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #e94560;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .stat-card .stat-number { font-size: 32px; font-weight: 700; color: #fff; margin: 8px 0; }
        .stat-card .stat-label { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .stat-icon { font-size: 28px; }
        .stat-card.blue { border-left-color: #3b82f6; }
        .stat-card.green { border-left-color: #22c55e; }
        .stat-card.orange { border-left-color: #f59e0b; }
        .stat-card.purple { border-left-color: #8b5cf6; }
        
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 10px 22px;
            background: #1a2236;
            border: 2px solid transparent;
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }
        .tab-btn:hover { border-color: #e94560; color: #fff; }
        .tab-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .search-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .search-filter input, .search-filter select {
            padding: 10px 16px;
            background: #1a2236;
            border: 1px solid #2a3a5c;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }
        .search-filter input:focus, .search-filter select:focus { outline: none; border-color: #e94560; }
        .search-filter select option { background: #1a2236; }
        
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .order-card, .repair-card {
            background: #1a2236;
            border-radius: 15px;
            border: 1px solid #2a3a5c;
            overflow: hidden;
            transition: 0.3s;
        }
        .order-card:hover, .repair-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        
        .card-header {
            padding: 15px 18px;
            background: #0f1724;
            border-bottom: 2px solid #2a3a5c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-header .card-id { font-weight: 700; font-size: 15px; color: #fff; }
        .card-header .card-id .badge { font-size: 10px; padding: 2px 10px; border-radius: 20px; margin-left: 8px; }
        .card-header .card-date { font-size: 11px; color: #94a3b8; }
        
        .card-body { padding: 15px 18px; }
        .card-body .customer-section {
            background: #0f1724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .card-body .customer-section .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-body .customer-section .value { font-size: 14px; font-weight: 500; color: #fff; }
        
        .card-body .items-section {
            background: #0f1724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .card-body .items-section .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #1a2236;
        }
        .card-body .items-section .item-row:last-child { border-bottom: none; }
        .card-body .items-section .item-name { font-size: 13px; color: #e2e8f0; }
        .card-body .items-section .item-price { font-size: 13px; font-weight: 600; color: #22c55e; }
        .card-body .items-section .item-qty { font-size: 12px; color: #94a3b8; }
        
        .card-body .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .card-body .details-grid .detail-item {
            background: #0f1724;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .card-body .details-grid .detail-item .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .card-body .details-grid .detail-item .value { font-size: 13px; font-weight: 500; color: #fff; }
        
        .card-footer {
            padding: 12px 18px;
            background: #0f1724;
            border-top: 1px solid #2a3a5c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-footer .otp {
            background: #0f1724;
            padding: 4px 14px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: #22c55e;
            letter-spacing: 2px;
            border: 1px dashed #22c55e;
        }
        .card-footer .total { font-size: 18px; font-weight: 700; color: #f59e0b; }
        .card-footer .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .card-footer .actions button {
            padding: 5px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: 0.3s;
            color: white;
        }
        .card-footer .actions button:hover { transform: scale(1.05); }
        .btn-primary { background: #3b82f6; }
        .btn-success { background: #22c55e; }
        .btn-danger { background: #ef4444; }
        .btn-warning { background: #f59e0b; color: #1a1a2e !important; }
        
        .badge-pending { background: #f59e0b; color: #1a1a2e; }
        .badge-shipped { background: #3b82f6; color: #fff; }
        .badge-completed { background: #22c55e; color: #1a1a2e; }
        .badge-cancelled { background: #ef4444; color: #fff; }
        .badge-inprogress { background: #8b5cf6; color: #fff; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 40px; margin-bottom: 10px; display: block; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            border-left: 4px solid #22c55e;
            display: none;
            z-index: 2000;
            font-size: 14px;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.success { border-left-color: #22c55e; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a2236;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #2a3a5c;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-content h3 { color: #fff; margin-bottom: 15px; font-size: 20px; }
        .modal-content .close-modal {
            float: right;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-content .close-modal:hover { color: #ef4444; }
        .modal-content label { display: block; margin: 10px 0 4px; font-weight: 600; color: #94a3b8; font-size: 13px; }
        .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px;
            background: #0f1724;
            border: 1px solid #2a3a5c;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }
        .modal-content .modal-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .modal-content .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; min-width: 100px; color: white; }
        
        .loading { display: flex; justify-content: center; align-items: center; padding: 30px; color: #94a3b8; grid-column: 1 / -1; }
        .loading .spinner {
            width: 30px; height: 30px;
            border: 3px solid #2a3a5c; border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .admin-header h1 { font-size: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .card-container { grid-template-columns: 1fr; }
            .card-body .details-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 8px 14px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .search-filter input, .search-filter select { min-width: 100%; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f1724; }
        ::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #e94560; }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="admin-header">
    <h1>🔧 <span>Trust Fix</span> Admin Panel</h1>
    <div class="header-right">
        <span class="user-badge" id="adminEmail">Admin</span>
        <button class="refresh-btn" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<!-- ===== MAIN ===== -->
<div class="admin-container">

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card blue"><div class="stat-icon">📦</div><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card orange"><div class="stat-icon">🔧</div><div class="stat-number" id="totalRepairs">0</div><div class="stat-label">Total Repairs</div></div>
        <div class="stat-card green"><div class="stat-icon">👥</div><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card purple"><div class="stat-icon">💰</div><div class="stat-number" id="totalRevenue">₹0</div><div class="stat-label">Total Revenue</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="orders" onclick="switchTab('orders')"><i class="fas fa-box"></i> Orders</button>
        <button class="tab-btn" data-tab="repairs" onclick="switchTab('repairs')"><i class="fas fa-tools"></i> Repairs</button>
        <button class="tab-btn" data-tab="users" onclick="switchTab('users')"><i class="fas fa-users"></i> Users</button>
    </div>

    <!-- TAB: ORDERS -->
    <div id="tab-orders" class="tab-content active">
        <div class="search-filter">
            <input type="text" id="ordersSearch" placeholder="🔍 Search by Order ID, Name, Phone..." oninput="filterOrders()">
            <select id="ordersStatusFilter" onchange="filterOrders()">
                <option value="all">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Shipped">Shipped</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>
        <div class="card-container" id="ordersContainer">
            <div class="loading"><div class="spinner"></div> Loading orders...</div>
        </div>
    </div>

    <!-- TAB: REPAIRS -->
    <div id="tab-repairs" class="tab-content">
        <div class="search-filter">
            <input type="text" id="repairsSearch" placeholder="🔍 Search by Repair ID, Name, Phone..." oninput="filterRepairs()">
            <select id="repairsStatusFilter" onchange="filterRepairs()">
                <option value="all">All Status</option>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>
        <div class="card-container" id="repairsContainer">
            <div class="loading"><div class="spinner"></div> Loading repairs...</div>
        </div>
    </div>

    <!-- TAB: USERS -->
    <div id="tab-users" class="tab-content">
        <div class="search-filter">
            <input type="text" id="usersSearch" placeholder="🔍 Search by Name, Email..." oninput="filterUsers()">
        </div>
        <div class="card-container" id="usersContainer">
            <div class="loading"><div class="spinner"></div> Loading users...</div>
        </div>
    </div>

</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="toast"></div>

<!-- ===== MODAL ===== -->
<div id="actionModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle">Update Status</h3>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn-primary" onclick="confirmAction()"><i class="fas fa-check"></i> Confirm</button>
            <button class="btn-danger" onclick="closeModal()"><i class="fas fa-times"></i> Cancel</button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- ==================== JAVASCRIPT ==================== -->
<!-- ============================================================ -->
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBUqsrDawGJbX-wgcBFRU4vuaasjt5ZnKQ",
        authDomain: "discountzone-da33a.firebaseapp.com",
        projectId: "discountzone-da33a",
        storageBucket: "discountzone-da33a.firebasestorage.app",
        messagingSenderId: "171693927426",
        appId: "1:171693927426:web:02e912a0a8ce86bfb70b1b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    emailjs.init("EE236Vmj4RMCjX1Dq");

    let allOrders = [], allRepairs = [], allUsers = [];
    let currentModalType = null, currentModalDocId = null;

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('adminEmail').textContent = user.email || 'Admin';
            loadAllData();
        } else {
            window.location.href = 'index.html';
        }
    });

    async function loadAllData() {
        showToast('🔄 Loading data...', 'info');
        try {
            await Promise.all([loadOrders(), loadRepairs(), loadUsers()]);
            updateStats();
            showToast('✅ Data loaded successfully!', 'success');
        } catch (e) {
            showToast('❌ Error: ' + e.message, 'error');
        }
    }

    // ===== LOAD ORDERS =====
    async function loadOrders() {
        const snapshot = await db.collection("orders").orderBy("date", "desc").get();
        allOrders = [];
        snapshot.forEach(doc => { const data = doc.data(); data.docId = doc.id; allOrders.push(data); });
        renderOrders();
    }

    // ===== LOAD REPAIRS =====
    async function loadRepairs() {
        const snapshot = await db.collection("repairs").orderBy("date", "desc").get();
        allRepairs = [];
        snapshot.forEach(doc => { const data = doc.data(); data.docId = doc.id; allRepairs.push(data); });
        renderRepairs();
    }

    // ===== LOAD USERS =====
    async function loadUsers() {
        const userMap = new Map();
        allOrders.forEach(order => {
            const email = order.customerEmail || '';
            if (email && !userMap.has(email)) {
                userMap.set(email, { email, name: order.customerName || email.split('@')[0], phone: order.customerPhone || '', address: order.customerAddress || '', orders: 0, repairs: 0, joined: order.date || new Date().toISOString() });
            }
            if (email) { const u = userMap.get(email); if (u) u.orders++; }
        });
        allRepairs.forEach(repair => {
            const email = repair.customerEmail || '';
            if (email && !userMap.has(email)) {
                userMap.set(email, { email, name: repair.customerName || email.split('@')[0], phone: repair.customerPhone || '', address: repair.customerAddress || '', orders: 0, repairs: 0, joined: repair.date || new Date().toISOString() });
            }
            if (email) { const u = userMap.get(email); if (u) u.repairs++; }
        });
        allUsers = Array.from(userMap.values());
        renderUsers();
    }

    // ===== UPDATE STATS =====
    function updateStats() {
        document.getElementById('totalOrders').textContent = allOrders.length;
        document.getElementById('totalRepairs').textContent = allRepairs.length;
        document.getElementById('totalUsers').textContent = allUsers.length;
        let revenue = 0;
        allOrders.forEach(order => { if (order.status !== 'Cancelled' && order.total) { const num = parseFloat(order.total); if (!isNaN(num)) revenue += num; } });
        document.getElementById('totalRevenue').textContent = '₹' + revenue.toFixed(0);
    }

    // ===== RENDER ORDERS =====
    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        const search = document.getElementById('ordersSearch').value.toLowerCase();
        const statusFilter = document.getElementById('ordersStatusFilter').value;
        
        let filtered = allOrders.filter(order => {
            const matchSearch = (order.orderId || '').toLowerCase().includes(search) ||
                               (order.customerName || '').toLowerCase().includes(search) ||
                               (order.customerPhone || '').includes(search) ||
                               (order.customerEmail || '').toLowerCase().includes(search);
            const matchStatus = statusFilter === 'all' || order.status === statusFilter;
            return matchSearch && matchStatus;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i> No orders found</div>`;
            return;
        }

        container.innerHTML = filtered.map(order => {
            const statusClass = getStatusClass(order.status);
            const statusLabel = order.status || 'Pending';
            
            // Parse items - support both string and array
            let itemsHtml = '';
            if (order.items) {
                if (typeof order.items === 'string') {
                    const lines = order.items.split('\n').filter(l => l.trim());
                    lines.forEach(line => {
                        let clean = line.replace(/^-\s*/, '').trim();
                        if (clean) {
                            let priceMatch = clean.match(/₹(\d+)/);
                            let priceDisplay = priceMatch ? `₹${priceMatch[1]}` : '';
                            let nameDisplay = clean.replace(/₹\d+(\s*x\s*\d+)?/, '').trim();
                            let qtyMatch = clean.match(/x\s*(\d+)/);
                            let qtyDisplay = qtyMatch ? `x ${qtyMatch[1]}` : '';
                            itemsHtml += `<div class="item-row"><span class="item-name">${nameDisplay} ${qtyDisplay}</span><span class="item-price">${priceDisplay}</span></div>`;
                        }
                    });
                }
            }
            if (!itemsHtml) itemsHtml = '<div style="color:#94a3b8; font-size:13px;">No items</div>';

            return `
            <div class="order-card">
                <div class="card-header">
                    <div>
                        <span class="card-id">🛒 ${order.orderId || order.docId || 'N/A'}</span>
                        <span class="badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <span class="card-date">${formatDate(order.date)}</span>
                </div>
                <div class="card-body">
                    <!-- Customer Details -->
                    <div class="customer-section">
                        <div class="label">👤 Customer Details</div>
                        <div class="value"><strong>${order.customerName || 'N/A'}</strong></div>
                        <div style="font-size:13px; color:#94a3b8;">📞 ${order.customerPhone || 'N/A'}</div>
                        <div style="font-size:13px; color:#94a3b8;">📧 ${order.customerEmail || 'N/A'}</div>
                        <div style="font-size:13px; color:#94a3b8;">📍 ${order.customerAddress || 'N/A'}</div>
                    </div>
                    
                    <!-- Items -->
                    <div class="items-section">
                        <div class="label">📦 Items Ordered</div>
                        ${itemsHtml}
                    </div>
                    
                    <!-- Details Grid -->
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="label">💳 Payment</div>
                            <div class="value">${order.paymentMethod || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">🔢 UTR / Txn ID</div>
                            <div class="value" style="font-size:12px;">${order.utr || 'COD'}</div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div>
                        <div class="otp">🔑 ${order.deliveryOTP || 'N/A'}</div>
                        <div style="font-size:10px; color:#94a3b8; margin-top:2px;">Delivery OTP</div>
                    </div>
                    <div class="total">₹${order.total || 0}</div>
                    <div class="actions">
                        <button class="btn-primary" onclick="openStatusModal('order', '${order.docId}', '${statusLabel}')"><i class="fas fa-edit"></i> Status</button>
                        ${order.status !== 'Cancelled' ? `<button class="btn-danger" onclick="cancelItem('order', '${order.docId}', '${order.customerName || 'Customer'}')"><i class="fas fa-times"></i> Cancel</button>` : ''}
                    </div>
                </div>
            </div>
        `}).join('');
    }

    // ===== RENDER REPAIRS =====
    function renderRepairs() {
        const container = document.getElementById('repairsContainer');
        const search = document.getElementById('repairsSearch').value.toLowerCase();
        const statusFilter = document.getElementById('repairsStatusFilter').value;
        
        let filtered = allRepairs.filter(repair => {
            const matchSearch = (repair.repairId || '').toLowerCase().includes(search) ||
                               (repair.customerName || '').toLowerCase().includes(search) ||
                               (repair.customerPhone || '').includes(search) ||
                               (repair.customerEmail || '').toLowerCase().includes(search);
            const matchStatus = statusFilter === 'all' || repair.status === statusFilter;
            return matchSearch && matchStatus;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i> No repairs found</div>`;
            return;
        }

        container.innerHTML = filtered.map(repair => {
            const statusClass = getStatusClass(repair.status);
            const statusLabel = repair.status || 'Pending';
            
            return `
            <div class="repair-card">
                <div class="card-header">
                    <div>
                        <span class="card-id">🔧 ${repair.repairId || repair.docId || 'N/A'}</span>
                        <span class="badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <span class="card-date">${formatDate(repair.date)}</span>
                </div>
                <div class="card-body">
                    <!-- Customer Details -->
                    <div class="customer-section">
                        <div class="label">👤 Customer Details</div>
                        <div class="value"><strong>${repair.customerName || 'N/A'}</strong></div>
                        <div style="font-size:13px; color:#94a3b8;">📞 ${repair.customerPhone || 'N/A'}</div>
                        <div style="font-size:13px; color:#94a3b8;">📧 ${repair.customerEmail || 'N/A'}</div>
                        <div style="font-size:13px; color:#94a3b8;">📍 ${repair.customerAddress || 'N/A'}</div>
                    </div>
                    
                    <!-- Device Details -->
                    <div class="items-section">
                        <div class="label">📱 Device Details</div>
                        <div style="display:flex; justify-content:space-between; padding:4px 0;">
                            <span style="color:#94a3b8;">Device Type</span>
                            <span style="font-weight:500;">${repair.deviceType || 'N/A'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #1a2236;">
                            <span style="color:#94a3b8;">Brand</span>
                            <span style="font-weight:500;">${repair.deviceBrand || 'N/A'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #1a2236;">
                            <span style="color:#94a3b8;">Model</span>
                            <span style="font-weight:500;">${repair.deviceModel || 'N/A'}</span>
                        </div>
                        <div style="padding:6px 0; background:#0a0e17; border-radius:6px; margin-top:4px; padding:6px 8px;">
                            <div style="color:#94a3b8; font-size:11px;">⚠️ Issue Reported</div>
                            <div style="font-size:13px; color:#e2e8f0;">${repair.deviceFaults || 'N/A'}</div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div>
                        <div class="otp">🔑 ${repair.deliveryOTP || 'N/A'}</div>
                        <div style="font-size:10px; color:#94a3b8; margin-top:2px;">Repair OTP</div>
                    </div>
                    <div style="font-size:13px; color:#94a3b8;">📞 ${repair.customerPhone || ''}</div>
                    <div class="actions">
                        <button class="btn-primary" onclick="openStatusModal('repair', '${repair.docId}', '${statusLabel}')"><i class="fas fa-edit"></i> Status</button>
                        ${repair.status !== 'Cancelled' ? `<button class="btn-danger" onclick="cancelItem('repair', '${repair.docId}', '${repair.customerName || 'Customer'}')"><i class="fas fa-times"></i> Cancel</button>` : ''}
                    </div>
                </div>
            </div>
        `}).join('');
    }

    // ===== RENDER USERS =====
    function renderUsers() {
        const container = document.getElementById('usersContainer');
        const search = document.getElementById('usersSearch').value.toLowerCase();
        
        let filtered = allUsers.filter(user => {
            return (user.name || '').toLowerCase().includes(search) ||
                   (user.email || '').toLowerCase().includes(search);
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i> No users found</div>`;
            return;
        }

        container.innerHTML = filtered.map(user => `
            <div class="order-card">
                <div class="card-header">
                    <div>
                        <span class="card-id">👤 ${user.name || 'N/A'}</span>
                        <span class="badge badge-completed">Active</span>
                    </div>
                    <span class="card-date">${formatDate(user.joined)}</span>
                </div>
                <div class="card-body">
                    <div class="customer-section">
                        <div class="label">📧 Email</div>
                        <div class="value">${user.email || 'N/A'}</div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="label">📦 Orders</div>
                            <div class="value">${user.orders || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">🔧 Repairs</div>
                            <div class="value">${user.repairs || 0}</div>
                        </div>
                        <div class="detail-item" style="grid-column: 1 / -1;">
                            <div class="label">📍 Address</div>
                            <div class="value" style="font-size:12px;">${user.address || 'N/A'}</div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <div style="font-size:13px; color:#94a3b8;">📞 ${user.phone || 'N/A'}</div>
                    <div style="font-size:12px; color:#64748b;">Total: ${(user.orders || 0) + (user.repairs || 0)} interactions</div>
                </div>
            </div>
        `).join('');
    }

    // ===== FILTER FUNCTIONS =====
    function filterOrders() { renderOrders(); }
    function filterRepairs() { renderRepairs(); }
    function filterUsers() { renderUsers(); }

    // ===== TAB SWITCH =====
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    }

    // ===== STATUS MODAL =====
    function openStatusModal(type, docId, currentStatus) {
        currentModalType = type;
        currentModalDocId = docId;
        
        const statusOptions = type === 'order' 
            ? ['Pending', 'Shipped', 'Completed', 'Cancelled']
            : ['Pending', 'In Progress', 'Completed', 'Cancelled'];
        
        document.getElementById('modalTitle').textContent = `Update ${type === 'order' ? 'Order' : 'Repair'} Status`;
        document.getElementById('modalBody').innerHTML = `
            <label>Current: <strong>${currentStatus}</strong></label>
            <label>New Status:</label>
            <select id="newStatusSelect">
                ${statusOptions.map(s => `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
            <label>Note (optional):</label>
            <textarea id="statusNote" placeholder="Add a note..." rows="2"></textarea>
        `;
        document.getElementById('actionModal').classList.add('active');
    }

    // ===== CONFIRM ACTION =====
    async function confirmAction() {
        const newStatus = document.getElementById('newStatusSelect').value;
        const note = document.getElementById('statusNote').value.trim();
        
        if (!newStatus) { showToast('Select a status', 'error'); return; }
        closeModal();
        showToast('🔄 Updating...', 'info');
        
        try {
            const collection = currentModalType === 'order' ? 'orders' : 'repairs';
            const docRef = db.collection(collection).doc(currentModalDocId);
            const doc = await docRef.get();
            const data = doc.data();
            
            await docRef.update({
                status: newStatus,
                updatedAt: new Date().toISOString(),
                statusNote: note || '',
                lastUpdatedBy: auth.currentUser?.email || 'Admin'
            });

            try {
                await emailjs.send("service_gbou2dl", "template_lp2zf4b", {
                    to_email: data.customerEmail || '',
                    customer_name: data.customerName || 'Customer',
                    order_date: new Date().toLocaleString(),
                    order_type: currentModalType === 'order' ? 'Product Order' : 'Repair Booking',
                    action_type: `STATUS UPDATED TO ${newStatus}`,
                    delivery_otp: data.deliveryOTP || 'N/A',
                    status_note: note || 'No note'
                });
            } catch(emailErr) { console.log('Email error:', emailErr); }

            showToast(`✅ Status updated to ${newStatus}!`, 'success');
            refreshData();
        } catch (e) {
            showToast('❌ Error: ' + e.message, 'error');
        }
    }

    // ===== CANCEL ITEM =====
    function cancelItem(type, docId, customerName) {
        if (!confirm(`⚠️ Cancel this ${type} for ${customerName}?`)) return;
        showToast('🔄 Cancelling...', 'info');
        const collection = type === 'order' ? 'orders' : 'repairs';
        db.collection(collection).doc(docId).update({
            status: 'Cancelled',
            cancelledAt: new Date().toISOString(),
            cancelledBy: 'Admin',
            cancelledByEmail: auth.currentUser?.email || 'Admin'
        }).then(() => {
            showToast('✅ Cancelled successfully!', 'success');
            refreshData();
        }).catch(e => showToast('❌ Error: ' + e.message, 'error'));
    }

    // ===== MODAL =====
    function closeModal() { document.getElementById('actionModal').classList.remove('active'); }
    function refreshData() { showToast('🔄 Refreshing...', 'info'); loadAllData(); }

    function logout() {
        if (confirm('Logout?')) { auth.signOut(); window.location.href = 'index.html'; }
    }

    function getStatusClass(status) {
        const map = {
            'Pending': 'badge-pending',
            'Shipped': 'badge-shipped',
            'Completed': 'badge-completed',
            'Cancelled': 'badge-cancelled',
            'In Progress': 'badge-inprogress'
        };
        return map[status] || 'badge-pending';
    }

    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        try {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        } catch { return dateStr; }
    }

    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast';
        if (type === 'error') toast.classList.add('error');
        else if (type === 'success') toast.classList.add('success');
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    // ===== REAL-TIME LISTENERS =====
    db.collection("orders").orderBy("date", "desc").onSnapshot(() => { loadOrders(); updateStats(); });
    db.collection("repairs").orderBy("date", "desc").onSnapshot(() => { loadRepairs(); updateStats(); });

    document.getElementById('actionModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
